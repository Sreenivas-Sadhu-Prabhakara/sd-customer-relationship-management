spring:
  application:
    name: sd-customer-relationship-management

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Customer Relationship Management"
    businessArea: "Sales and Service"
    businessDomain: "Customer Management"
    functionalPattern: "Direct"
    assetType: "Customer Relationship"
    controlRecord: "Customer Relationship Strategy"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
